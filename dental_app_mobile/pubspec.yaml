name: dental_app_mobile
description: A Flutter mobile app for dental practice management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.2

  # State Management
  provider: ^6.1.1

  # HTTP & API
  dio: ^5.4.0

  # Gerçek zamanlı bildirimler (backend Socket.IO v4)
  socket_io_client: ^2.0.3

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/mouth_chart.png
    - assets/data/tdb_2026_tarife_full.json
