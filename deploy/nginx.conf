# MultiPlatformDentalApp — nginx reverse proxy yapılandırması
#
# Kurulum (Ubuntu VPS):
#   1. Bu dosyayı /etc/nginx/sites-available/dentalapp olarak kopyalayın
#   2. <DOMAIN> yerine gerçek alan adınızı yazın
#   3. Angular build çıktısını /var/www/dentalapp'e kopyalayın:
#        ng build --configuration production
#        cp -r dental-app-web/dist/dental-app-web/browser/* /var/www/dentalapp/
#   4. sudo ln -s /etc/nginx/sites-available/dentalapp /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx
#   6. TLS: sudo certbot --nginx -d <DOMAIN>
#
# NOT: /socket.io/ bloğundaki Upgrade/Connection header'ları websocket için
# ZORUNLUDUR — eksikse Socket.IO sessizce long-polling'e düşer.

server {
    listen 80;
    server_name <DOMAIN>;

    # Certbot bu bloğu 443'e yönlendirme ile güncelleyecektir

    root /var/www/dentalapp;
    index index.html;

    # Angular SPA — bilinmeyen yollar index.html'e düşer
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API → Node backend
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sağlık kontrolleri
    location = /healthz {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
    location = /readyz {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # Socket.IO — websocket upgrade header'ları ZORUNLU
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Güvenlik header'ları (backend helmet zaten ekliyor; statik dosyalar için)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
}
