name: Backend CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dentaluser
          POSTGRES_PASSWORD: StrongPass123!
          POSTGRES_DB: dentalappdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-not-for-production
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: dentalappdb_test
      DB_USER: dentaluser
      DB_PASS: StrongPass123!
      TZ: Europe/Istanbul

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (mocked db)
        run: npm test

      - name: Apply schema to test database
        run: npm run db:migrate

      - name: Integration tests (real PostgreSQL)
        run: npm run test:integration
